name: Run Nasdaq Bot Scan

on:
  schedule:
    # Triggers every 4 hours automatically
    - cron: '0 */4 * * *'
  workflow_dispatch: # This adds a manual "Run Now" button inside GitHub for easy testing!

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install yfinance pandas numpy requests

      - name: Execute Trading Script
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python nas_bot.py
# Force a test alert
send_discord_alert("🤖 Bot Heartbeat: System is online and monitoring!")
